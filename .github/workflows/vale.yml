name: Türkçe Yazım Denetimi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NO_COLOR: "1"

jobs:
  # Temiz belge testi — hata çıkmamalı
  clean-test:
    name: "Temiz Belge Testi"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Denomas/Turkce-yazim-denetimi@v1
        with:
          files: 'docs/tr/giris.md'
          min_alert_level: 'warning'
          no_spelling: 'true'

  # Hatalı belge testi — Vale hataları yakalamalı
  dirty-test:
    name: "Hatalı Belge Testi (Beklenen Hatalar)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: Denomas/Turkce-yazim-denetimi@v1
        with:
          files: 'docs/tr/hatali-belge.md'
          min_alert_level: 'warning'
          no_spelling: 'true'

  # Pre-commit entegrasyon testi
  precommit-test:
    name: "Pre-commit Testi"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Pre-commit kur ve çalıştır (sadece temiz dosya)
        run: |
          pip install pre-commit
          VALE_TURKISH_NO_SPELLING=1 pre-commit run Turkce-yazim-denetimi --files docs/tr/giris.md
